name: Typst research report

on:
  push:
    branches: [main]
    paths:
      - "research-report/**"
      - ".github/workflows/report.yml"
  pull_request:
    paths:
      - "research-report/**"
      - ".github/workflows/report.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v3
        with:
          typst-version: "0.14.2"

      - name: Compile report
        working-directory: research-report
        run: typst compile main.typ main.pdf

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: haptic-skin-report
          path: research-report/main.pdf
          if-no-files-found: error
