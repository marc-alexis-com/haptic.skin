<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAPTIC.SKIN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            color: #f0f0f0;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .dot { color: #8b5cf6; }
        p {
            font-size: 1.1rem;
            color: #888;
            margin-top: 1rem;
        }
        a {
            color: #8b5cf6;
            text-decoration: none;
        }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>HAPTIC<span class="dot">.</span>SKIN</h1>
        <p>Open-source bidirectional haptic wearable platform.</p>
        <p style="margin-top: 2rem;">
            <a href="https://github.com/marc-alexis-com/haptic.skin">GitHub</a>
        </p>
    </div>
</body>
</html>
